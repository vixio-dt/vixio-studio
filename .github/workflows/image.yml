name: Build and push image

# Builds the nginx-served SPA image and publishes it to GHCR. The VPS pulls
# this image; no SSH and no build on the server.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vixio-dt/vixio-studio:latest
            ghcr.io/vixio-dt/vixio-studio:${{ github.sha }}
