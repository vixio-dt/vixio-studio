server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: react-router owns every path, so unknown routes
  # resolve to index.html rather than 404.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Content-hashed build assets are safe to cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # The entry document must always revalidate so deploys take effect.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
